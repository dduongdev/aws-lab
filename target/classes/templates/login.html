<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Đăng nhập</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        .container { width: 320px; margin: 100px auto; background: white; padding: 24px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.12); }
        input { width: 100%; padding: 10px; margin: 8px 0; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #0077cc; color: white; border: none; border-radius: 4px; }
        .error { color: #a94442; background: #f2dede; padding: 10px; border-radius: 4px; margin-bottom: 12px; }
    </style>
</head>
<body>
<div class="container">
    <h2>Đăng nhập</h2>
    <div th:if="${error}" class="error" th:text="${error}"></div>
    <form th:action="@{/login}" method="post">
        <label for="username">Tên đăng nhập</label>
        <input id="username" name="username" type="text" required />

        <label for="password">Mật khẩu</label>
        <input id="password" name="password" type="password" required />

        <button type="submit">Đăng nhập</button>
    </form>
</div>
</body>
</html>
